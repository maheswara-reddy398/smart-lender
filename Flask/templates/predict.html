<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Loan Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <h1>Smart Lender</h1>

    <p class="subtitle">
        Loan Eligibility Prediction System
    </p>

    <form method="POST">

        <div class="form-row">

            <div class="form-group">

                <label>Gender</label>

                <select name="Gender">

                    <option value="1">Male</option>
                    <option value="0">Female</option>

                </select>

            </div>

            <div class="form-group">

                <label>Married</label>

                <select name="Married">

                    <option value="1">Yes</option>
                    <option value="0">No</option>

                </select>

            </div>

        </div>


        <div class="form-row">

            <div class="form-group">

                <label>Dependents</label>

                <select name="Dependents">

                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3+</option>

                </select>

            </div>

            <div class="form-group">

                <label>Education</label>

                <select name="Education">

                    <option value="0">Graduate</option>
                    <option value="1">Not Graduate</option>

                </select>

            </div>

        </div>


        <div class="form-row">

            <div class="form-group">

                <label>Self Employed</label>

                <select name="Self_Employed">

                    <option value="1">Yes</option>
                    <option value="0">No</option>

                </select>

            </div>

            <div class="form-group">

                <label>Credit History</label>

                <select name="Credit_History">

                    <option value="1">Good</option>
                    <option value="0">Bad</option>

                </select>

            </div>

        </div>


        <div class="form-row">

            <div class="form-group">

                <label>Applicant Income (₹ / Month)</label>

                <input type="number"
                       name="ApplicantIncome"
                       placeholder="Example : 50000"
                       required>

            </div>

            <div class="form-group">

                <label>Coapplicant Income (₹ / Month)</label>

                <input type="number"
                       name="CoapplicantIncome"
                       placeholder="Example : 20000"
                       required>

            </div>

        </div>


        <div class="form-row">

            <div class="form-group">

                <label>Loan Amount (₹ Thousands)</label>

                <input type="number"
                       name="LoanAmount"
                       placeholder="Example : 128"
                       required>

            </div>

            <div class="form-group">

                <label>Loan Term (Months)</label>

                <input type="number"
                       name="Loan_Amount_Term"
                       placeholder="Example : 360"
                       required>

            </div>

        </div>


        <div class="form-row">

            <div class="form-group">

                <label>Property Area</label>

                <select name="Property_Area">

                    <option value="2">Urban</option>
                    <option value="1">Semiurban</option>
                    <option value="0">Rural</option>

                </select>

            </div>

            <div class="form-group">

            </div>

        </div>


        <div class="note">

            <strong>Instructions</strong>

            <br><br>

            • Enter monthly income in Indian Rupees (₹).

            <br>

            • Loan Amount should be entered in thousands.
            Example: 128 = ₹1.28 lakh.

            <br>

            • Loan Term should be entered in months.
            Example: 360 = 30 years.

        </div>


        <button type="submit">

            Predict Loan Eligibility

        </button>

    </form>

</div>

</body>

</html>
